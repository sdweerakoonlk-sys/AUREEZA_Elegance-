<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Aureeza</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="images/logo.jpg" alt="Aureeza Logo" class="logo-img">
                <div class="logo-text">
                    <h1>AUREEZA</h1>
                    <p class="tagline">Elegance Redefined</p>
                </div>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="shop.html" class="nav-link">Shop</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
                <li><a href="cart.html" class="nav-link cart-icon">🛒 Cart (<span id="cart-count">0</span>)</a></li>
            </ul>
        </div>
    </nav>

    <section class="page-header">
        <h1>Checkout</h1>
    </section>

    <section class="container" style="margin-bottom: 50px;">
        <div class="checkout-grid">
            <div class="checkout-form-container">
                <h2>Shipping Details</h2>
                <form class="checkout-form" onsubmit="handleCheckout(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" required>
                    </div>
                    <div class="form-group">
                        <label>Shipping Address</label>
                        <textarea rows="3" required></textarea>
                    </div>
                    <h2>Payment Method</h2>
                    <div class="payment-options">
                        <label><input type="radio" name="payment" value="cod" checked> Cash on Delivery</label>
                        <label><input type="radio" name="payment" value="bank"> Bank Transfer</label>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Place Order</button>
                </form>
            </div>
            <div class="order-summary">
                <h2>Order Summary</h2>
                <div id="checkout-items">
                    <!-- Loaded by script.js -->
                </div>
                <hr>
                <div class="total-row">
                    <h3>Total</h3>
                    <h3 id="checkout-total">$0.00</h3>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2024 Aureeza - Elegance Redefined. All rights reserved.</p>
        <p>Phone: 0773938899 | Email: aureeza@gmail.com</p>
    </footer>

    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            displayCheckoutSummary();
        });
    </script>
</body>
</html>
